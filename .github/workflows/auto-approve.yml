name: Auto-approve tickets sem resposta

on:
  schedule:
    # Roda a cada hora (UTC)
    - cron: "0 * * * *"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  auto-approve:
    name: Verificar tickets aguardando aprovação há +48h
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de auto-aprovação
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X GET "${{ vars.APP_URL }}/api/cron/auto-approve" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "Status HTTP: $status"
          echo "Resposta: $body"

          if [ "$status" != "200" ]; then
            echo "❌ Falha ao executar auto-aprovação (HTTP $status)"
            exit 1
          fi

          echo "✅ Auto-aprovação executada com sucesso"
