name: Auto-approve tickets sem resposta

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  auto-approve:
    name: Verificar tickets aguardando aprovação há +48h
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de auto-aprovação
        env:
          APP_URL: ${{ vars.APP_URL || 'https://helpdesk-pi-teal.vercel.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Chamando: $APP_URL/api/cron/auto-approve"

          response=$(curl -s -w "\n%{http_code}" \
            -X GET "$APP_URL/api/cron/auto-approve" \
            -H "Authorization: Bearer $CRON_SECRET")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "Status HTTP: $status"
          echo "Resposta: $body"

          if [ "$status" != "200" ]; then
            echo "Falha ao executar auto-aprovação (HTTP $status)"
            exit 1
          fi

          echo "Auto-aprovação executada com sucesso"
