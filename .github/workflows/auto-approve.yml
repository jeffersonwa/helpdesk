name: Auto-approve tickets sem resposta

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  auto-approve:
    name: Verificar tickets aguardando aprovação há +48h
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Executar auto-aprovação
        run: node scripts/auto-approve.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL || 'helpdesk@resend.dev' }}
          APP_URL: ${{ vars.APP_URL || 'https://helpdesk-pi-teal.vercel.app' }}
